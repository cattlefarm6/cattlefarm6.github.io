<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCards | Dark Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* ОСНОВНОЙ ФОН */
        body { 
            font-family: 'Roboto', sans-serif; 
            margin: 0; 
            background: #0d0d0d; /* Глубокий черный */
            color: #eeeeee; 
        }

        .container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 0 20px;
        }

        h1 { 
            font-family: 'Oswald', sans-serif; 
            font-size: 3.5rem; 
            letter-spacing: 4px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .instruction {
            color: #888;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            margin-bottom: 40px;
            border-left: 2px solid #ff9500; /* Оранжевая полоска слева */
            padding-left: 15px;
        }

        /* ТОТ САМЫЙ ОБЩИЙ БЛОК (КАРТОЧКА) */
        .main-card {
            background: #161616; /* Чуть светлее фона */
            border: 1px solid #222;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-title {
            font-family: 'Oswald', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* СПИСКИ (АККОРДЕОНЫ) */
        .accordion-item {
            background: #1f1f1f; /* Цвет плашки */
            margin-bottom: 12px;
            border-radius: 6px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .accordion-item:hover {
            background: #252525;
        }

        summary {
            padding: 18px 25px;
            font-weight: 700;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ff9500; /* Оранжевый текст заголовков */
            text-transform: uppercase;
            letter-spacing: 1px;
            outline: none;
        }

        /* Иконка стрелочки справа */
        summary::after {
            content: '▼';
            font-size: 0.7rem;
            color: #555;
            transition: 0.3s;
        }

        details[open] summary::after {
            transform: rotate(180deg);
        }

        /* КОНТЕНТ ВНУТРИ */
        .button-group {
            display: flex;
            gap: 10px;
            padding: 0 25px 20px 25px;
        }

        .copy-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
        }

        .btn-primary { background: #ff9500; color: #000; }
        .btn-primary:hover { background: #ffaa33; }

        .btn-secondary { background: #333; color: #fff; }
        .btn-secondary:hover { background: #444; }

        .copy-btn.success { background: #2ecc71 !important; color: #fff; }

        /* Адаптив */
        @media (max-width: 600px) {
            .main-card { padding: 20px; }
            .button-group { flex-direction: column; }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>CCARDS</h1>
    <div class="instruction">Используйте кнопки внутри списков для копирования конфигураций</div>

    <div class="main-card">
        <div class="card-title">APHIN</div>

        <details class="accordion-item">
            <summary>Служба безопасности</summary>
            <div class="button-group">
                <button class="copy-btn btn-primary" data-payload="CODE_SEC_1">Вариант 1</button>
                <button class="copy-btn btn-secondary" data-payload="CODE_SEC_2">Вариант 2</button>
            </div>
        </details>

        <details class="accordion-item">
            <summary>Научная служба и руководство</summary>
            <div class="button-group">
                <button class="copy-btn btn-primary" data-payload="CODE_SCI_1">Конфиг</button>
                <button class="copy-btn btn-secondary" data-payload="CODE_SCI_2">JSON</button>
            </div>
        </details>

        <details class="accordion-item">
            <summary>Персонал фонда и класс D</summary>
            <div class="button-group">
                <button class="copy-btn btn-primary" data-payload="CODE_D_1">Класс D</button>
                <button class="copy-btn btn-secondary" data-payload="CODE_D_2">Персонал</button>
            </div>
        </details>

    </div>
    </div>

<script>
    document.addEventListener('click', function(e) {
        if (e.target.classList.contains('copy-btn')) {
            const btn = e.target;
            const text = btn.getAttribute('data-payload');
            const originalText = btn.innerText;

            navigator.clipboard.writeText(text).then(() => {
                btn.innerText = 'Скопировано!';
                btn.classList.add('success');
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.remove('success');
                }, 1500);
            });
        }
    });
</script>

</body>
</html>
