<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор Карт | Protocol: Revival</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="AStyle.css">
    <style>
        /* Стили для конструктора */
        .constructor-layout {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .c-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #2d3545;
            border-radius: 4px;
            outline: none;
            margin-top: 10px;
        }

        .c-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .c-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .slider-val {
            background: #161b26;
            border: 1px solid #2d3545;
            padding: 2px 10px;
            border-radius: 4px;
            color: #fff;
            font-weight: 700;
            font-family: monospace;
        }

        /* Выбор цвета плитками */
        .color-selector {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
            margin-top: 8px;
        }

        .color-label input {
            display: none;
        }

        .color-btn-inner {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #161b26;
            border: 1px solid #2d3545;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s ease;
            font-size: 0.85rem;
            font-family: monospace;
        }

        /* Состояние активного цвета */
        .color-label input:checked + .color-btn-inner {
            border-color: var(--accent);
            background: #1f2532;
            color: #fff;
            box-shadow: 0 0 10px rgba(71, 138, 201, 0.2);
        }

        .result-box {
            position: sticky;
            bottom: 20px;
            z-index: 10;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Protocol:<strong> Revival</strong></div>
    <nav>
        <a href="./">Главная</a>
        <a href="cassie.html">C.A.S.S.I.E.</a>
        <a href="cinfo.html">Cinfo</a>
        <a href="ccards.html">CCards</a> 
        <a href="guides.html">Гайд</a> 
        <a href="constructor.html" class="active">Конструктор</a>
    </nav>
</header>

<div class="container">
    <h1>Генератор Карт</h1>
    <div class="instruction">Быстрая настройка и генерация команды ckeycard</div>

    <div class="main-card constructor-layout">
        <div class="card-title">// БАЗОВЫЕ ДАННЫЕ</div>
        <div class="input-row">
            <div class="input-group">
                <label>Player ID</label>
                <input type="number" id="p_id" class="c-input" value="1">
            </div>
            <div class="input-group">
                <label>Модель корпуса</label>
                <select id="p_model" class="c-select">
                    <option value="keycardcustomtaskforce">TaskForce (МОГ)</option>
                    <option value="keycardcustommetalcase">Metal Case (Металл)</option>
                    <option value="keycardcustommanagement">Management (Менеджмент)</option>
                    <option value="keycardcustomsite02">Site-02 (Зона-02)</option>
                </select>
            </div>
        </div>
        <div class="input-row">
            <div class="input-group">
                <label>Имя в инвентаре</label>
                <input type="text" id="p_inv" class="c-input" value="Keycard">
            </div>
            <div class="input-group">
                <label>Владелец (на карте)</label>
                <input type="text" id="p_owner" class="c-input" value="Никнейм">
            </div>
        </div>

        <div class="card-title" style="margin-top: 20px;">// УРОВНИ И ИНДИКАТОРЫ</div>
        <div class="input-row">
            <div class="input-group">
                <div class="slider-header">
                    <label>Допуск SCP</label>
                    <span class="slider-val" id="val_scp">3</span>
                </div>
                <input type="range" id="p_scp" class="c-slider" min="0" max="3" value="3">
            </div>
            <div class="input-group">
                <div class="slider-header">
                    <label>Допуск к Оружию</label>
                    <span class="slider-val" id="val_weap">2</span>
                </div>
                <input type="range" id="p_weap" class="c-slider" min="0" max="3" value="2">
            </div>
            <div class="input-group">
                <div class="slider-header">
                    <label>Админ. допуск</label>
                    <span class="slider-val" id="val_adm">1</span>
                </div>
                <input type="range" id="p_adm" class="c-slider" min="0" max="3" value="1">
            </div>
            <div class="input-group">
                <div class="slider-header">
                    <label>Кол-во колец (МОГ)</label>
                    <span class="slider-val" id="val_rings">1</span>
                </div>
                <input type="range" id="p_rings" class="c-slider" min="0" max="3" value="1">
            </div>
        </div>

        <div class="card-title" style="margin-top: 20px;">// ДИЗАЙН И ЦВЕТА</div>
        <div class="input-group">
            <label>Текст на карте</label>
            <input type="text" id="p_text" class="c-input" value="Ключ-карта">
        </div>

        <div class="input-group" style="margin-top: 15px;">
            <label>Основной фон карты</label>
            <div class="color-selector" id="color_bg">
                <label class="color-label"><input type="radio" name="bgCol" value="black" checked><div class="color-btn-inner"><div class="color-swatch" style="background: #000;"></div> Black</div></label>
                <label class="color-label"><input type="radio" name="bgCol" value="white"><div class="color-btn-inner"><div class="color-swatch" style="background: #FFF;"></div> White</div></label>
                <label class="color-label"><input type="radio" name="bgCol" value="red"><div class="color-btn-inner"><div class="color-swatch" style="background: #C50000;"></div> Red</div></label>
                <label class="color-label"><input type="radio" name="bgCol" value="blue"><div class="color-btn-inner"><div class="color-swatch" style="background: #00B7EB;"></div> Blue</div></label>
            </div>
        </div>

        <div class="input-group" style="margin-top: 15px;">
            <label>Цвет кружков допуска</label>
            <div class="color-selector" id="color_circle">
                <label class="color-label"><input type="radio" name="cCol" value="red"><div class="color-btn-inner"><div class="color-swatch" style="background: #C50000;"></div> Red</div></label>
                <label class="color-label"><input type="radio" name="cCol" value="white" checked><div class="color-btn-inner"><div class="color-swatch" style="background: #FFF;"></div> White</div></label>
                <label class="color-label"><input type="radio" name="cCol" value="gold"><div class="color-btn-inner"><div class="color-swatch" style="background: #FFD700;"></div> Gold</div></label>
                <label class="color-label"><input type="radio" name="cCol" value="green"><div class="color-btn-inner"><div class="color-swatch" style="background: #32CD32;"></div> Green</div></label>
            </div>
        </div>

        <div class="input-group" style="margin-top: 15px;">
            <label>Цвет текста</label>
            <div class="color-selector" id="color_text">
                <label class="color-label"><input type="radio" name="tCol" value="white"><div class="color-btn-inner"><div class="color-swatch" style="background: #FFF;"></div> White</div></label>
                <label class="color-label"><input type="radio" name="tCol" value="blue" checked><div class="color-btn-inner"><div class="color-swatch" style="background: #00B7EB;"></div> Blue</div></label>
                <label class="color-label"><input type="radio" name="tCol" value="black"><div class="color-btn-inner"><div class="color-swatch" style="background: #000;"></div> Black</div></label>
                <label class="color-label"><input type="radio" name="tCol" value="yellow"><div class="color-btn-inner"><div class="color-swatch" style="background: #FAFF86;"></div> Yellow</div></label>
            </div>
        </div>
    </div>

    <div class="result-box">
        <div class="card-title" style="font-size: 1.2rem; margin-bottom: 10px;">// ГОТОВАЯ КОМАНДА</div>
        <div class="result-command" id="final_cmd" style="margin-bottom: 15px;">Загрузка...</div>
        <button class="copy-btn btn-primary" id="copy_btn" style="width: 100%;">КОПИРОВАТЬ</button>
    </div>
</div>

<script>
    function updateGenerator() {
        // Получаем значения текстов и селектов
        const id = document.getElementById('p_id').value || "1";
        const model = document.getElementById('p_model').value;
        const inv = document.getElementById('p_inv').value || "Keycard";
        const text = document.getElementById('p_text').value || "Текст";
        const owner = document.getElementById('p_owner').value || "Никнейм";

        // Получаем значения ползунков и обновляем цифры рядом с ними
        const scp = document.getElementById('p_scp').value;
        document.getElementById('val_scp').innerText = scp;
        
        const weap = document.getElementById('p_weap').value;
        document.getElementById('val_weap').innerText = weap;
        
        const adm = document.getElementById('p_adm').value;
        document.getElementById('val_adm').innerText = adm;
        
        const rings = document.getElementById('p_rings').value;
        document.getElementById('val_rings').innerText = rings;

        // Получаем выбранные цвета из радио-кнопок
        const bgCol = document.querySelector('input[name="bgCol"]:checked').value;
        const cCol = document.querySelector('input[name="cCol"]:checked').value;
        const tCol = document.querySelector('input[name="tCol"]:checked').value;

        // Формируем итоговую команду
        const cmd = `ckeycard ${id} ${model} ${inv} ${scp} ${weap} ${adm} ${cCol} ${bgCol} ${text} ${tCol} ${owner} ${rings}`;
        
        document.getElementById('final_cmd').innerText = cmd;
    }

    // Вешаем слушатели на все инпуты (слайдеры, текст, селекты, радио-кнопки)
    document.querySelectorAll('input, select').forEach(el => {
        el.addEventListener('input', updateGenerator);
        // Для радио кнопок используем change
        if(el.type === 'radio') {
            el.addEventListener('change', updateGenerator);
        }
    });

    // Логика кнопки копирования
    document.getElementById('copy_btn').addEventListener('click', function() {
        const cmdText = document.getElementById('final_cmd').innerText;
        navigator.clipboard.writeText(cmdText).then(() => {
            const originalText = this.innerText;
            this.innerText = 'СКОПИРОВАНО!';
            this.style.backgroundColor = 'var(--success)';
            setTimeout(() => {
                this.innerText = originalText;
                this.style.backgroundColor = 'var(--accent)';
            }, 1000);
        });
    });

    // Запускаем один раз при загрузке страницы, чтобы собрать первую команду
    updateGenerator();
</script>

</body>
</html>
