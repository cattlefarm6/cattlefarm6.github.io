<div class="container">
    <h1>CCARDS</h1>
    <div class="instruction">Используйте кнопки внутри списков для копирования конфигураций</div>

    <div class="main-card">
        <div class="card-title">Кастомные ключ карты</div>

        <details class="accordion-item">
            <summary>Служба безопасности</summary>
            <div class="button-group">
                <button class="copy-btn btn-primary" data-payload="Йоу йоу йоу">Копировать Конфиг</button>
                <button class="copy-btn btn-secondary" data-payload="CODE_SEC_1">Копировать Конфиг</button>

                <button class="copy-btn btn-primary" data-payload="Йоу йоу йоу">Копировать Конфиг</button>
                <button class="copy-btn btn-secondary" data-payload="CODE_SEC_1">Копировать Конфиг</button>
        </details>

        <details class="accordion-item">
            <summary>Научная служба и руководство</summary>
            <div class="button-group">
                <button class="copy-btn btn-primary" data-payload="CODE_SCI_1">Конфиг Научников</button>
                <button class="copy-btn btn-secondary" data-payload="CODE_SCI_2">Конфиг Руководства</button>
            </div>
        </details>

        <details class="accordion-item">
            <summary>Персонал фонда и класс D</summary>
            <div class="button-group">
                <button class="copy-btn btn-primary" data-payload="CODE_D_1">Карта D-Класса</button>

</footer>

<script>
    // Оптимизированный JS
    document.addEventListener('click', function(e) {
        if (e.target.classList.contains('copy-btn')) {
            const btn = e.target;
            // Проверка, не нажата ли уже кнопка (чтобы избежать спама кликами)
            if (btn.classList.contains('success')) return;

            const textToCopy = btn.getAttribute('data-payload');
            const originalText = btn.innerText;

            navigator.clipboard.writeText(textToCopy).then(() => {
                btn.innerText = 'СКОПИРОВАНО!';
                btn.classList.add('success');
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.remove('success');
                }, 1500);
            }).catch(err => {
                console.error('Ошибка копирования: ', err);
                btn.innerText = 'ОШИБКА!';
                setTimeout(() => btn.innerText = originalText, 1500);
            });
        }
    });
    // ЛОГИКА КОНСТРУКТОРОВ КАРТ
    const finalCommandEl = document.getElementById('final-command');
    const copyBtn = document.getElementById('copy-constructor-btn');
    
    // Функция сборки команды
    function generateCommand() {
        // Собираем значения из обычных полей
        const id = document.getElementById('c_id').value || '1';
        const model = document.getElementById('c_model').value;
        const invName = document.getElementById('c_invName').value || 'Keycard';
        const cardText = document.getElementById('c_cardText').value || 'Ключ-карта';
        const owner = document.getElementById('c_owner').value || 'Никнейм';
        const circleColor = document.getElementById('c_circleColor').value || 'red';
        const bgColor = document.getElementById('c_bgColor').value || 'black';
        const textColor = document.getElementById('c_textColor').value || 'blue';
        const circleCount = document.getElementById('c_circleCount').value || '1';

        // Собираем значения из стильных радиокнопок
        const scp = document.querySelector('input[name="c_scp"]:checked').value;
        const weap = document.querySelector('input[name="c_weap"]:checked').value;
        const adm = document.querySelector('input[name="c_adm"]:checked').value;

        // Формируем финальную строку
        const cmd = `ckeycard ${id} ${model} ${invName} ${scp} ${weap} ${adm} ${circleColor} ${bgColor} ${cardText} ${textColor} ${owner} ${circleCount}`;
        
        finalCommandEl.innerText = cmd;
        
        // ФИКС: Передаем команду в твой универсальный скрипт копирования
        copyBtn.setAttribute('data-payload', cmd);
    }

    // Слушаем изменения во всех инпутах конструктора
    const allInputs = document.querySelectorAll('.c-input, .c-select, input[type="radio"]');
    allInputs.forEach(input => {
        input.addEventListener('input', generateCommand);
        input.addEventListener('change', generateCommand);
    });

    // Запускаем один раз при загрузке страницы, чтобы кнопка сразу получила данные
    generateCommand();
</script>

</body>
