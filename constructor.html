<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор Карт | Desolation</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="AStyle.css">
    <style>
        .constructor-layout {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
            align-items: start;
        }

        /* Визуальный предпросмотр карточки */
        .preview-sticky {
            position: sticky;
            top: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card-visual {
            width: 100%;
            aspect-ratio: 1.6 / 1;
            background: #222;
            border-radius: 15px;
            position: relative;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .card-visual .hole {
            width: 40px;
            height: 40px;
            background: var(--bg-page);
            border-radius: 50%;
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            border: 4px solid rgba(255,255,255,0.2);
        }

        .card-visual .access-dots {
            position: absolute;
            right: 20px;
            top: 20px;
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            background: #fff;
        }

        .card-text-main {
            position: absolute;
            left: 80px;
            top: 45%;
            font-family: var(--font-heading);
            font-size: 1.8rem;
            text-transform: uppercase;
        }

        .card-owner {
            position: absolute;
            left: 80px;
            bottom: 25px;
            font-size: 0.8rem;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        @media (max-width: 900px) {
            .constructor-layout { grid-template-columns: 1fr; }
            .preview-sticky { position: relative; top: 0; order: -1; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Desolation <strong>Project</strong></div>
    <nav class="nav-links">
        <a href="./">Главная</a>
        <a href="guides.html">Гайд</a> 
        <a href="constructor.html" class="active">Конструктор</a>
    </nav>
</header>

<div class="container">
    <h1>KEYCARD ARCHITECT</h1>
    <div class="instruction">Расширенный редактор кастомных ключ-карт сервера</div>

    <div class="constructor-layout">
        <div class="main-card">
            <div class="card-title">// ПАРАМЕТРЫ СИСТЕМЫ</div>
            
            <div class="constructor-grid">
                <div class="input-group">
                    <label>Player ID</label>
                    <input type="number" id="p_id" class="c-input" value="1">
                </div>
                <div class="input-group">
                    <label>Модель корпуса</label>
                    <select id="p_model" class="c-select">
                        <option value="keycardcustomtaskforce">TaskForce</option>
                        <option value="keycardcustommetalcase">Metal Case</option>
                        <option value="keycardcustommanagement">Management</option>
                        <option value="keycardcustomsite02">Site-02</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label>Имя в инвентаре</label>
                <input type="text" id="p_inv" class="c-input" value="Keycard">
            </div>

            <div class="constructor-grid">
                <div class="input-group">
                    <label>SCP Access</label>
                    <input type="number" id="p_scp" class="c-input" value="3" min="0" max="3">
                </div>
                <div class="input-group">
                    <label>Weapon Access</label>
                    <input type="number" id="p_weap" class="c-input" value="2" min="0" max="3">
                </div>
                <div class="input-group">
                    <label>Admin Access</label>
                    <input type="number" id="p_adm" class="c-input" value="1" min="0" max="3">
                </div>
            </div>

            <div class="constructor-grid">
                <div class="input-group">
                    <label>Цвет индикаторов</label>
                    <select id="p_cColor" class="c-select">
                        <option value="red">Red</option>
                        <option value="blue">Blue</option>
                        <option value="green">Green</option>
                        <option value="yellow">Yellow</option>
                        <option value="white" selected>White</option>
                        <option value="gold">Gold</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Фон карты</label>
                    <select id="p_bgColor" class="c-select">
                        <option value="black" selected>Black</option>
                        <option value="blue">Blue</option>
                        <option value="red">Red</option>
                        <option value="grey">Grey</option>
                        <option value="white">White</option>
                    </select>
                </div>
            </div>

            <div class="constructor-grid">
                <div class="input-group">
                    <label>Текст на карте</label>
                    <input type="text" id="p_text" class="c-input" value="Ключ-карта">
                </div>
                <div class="input-group">
                    <label>Цвет текста</label>
                    <select id="p_tColor" class="c-select">
                        <option value="white">White</option>
                        <option value="blue" selected>Blue</option>
                        <option value="red">Red</option>
                        <option value="gold">Gold</option>
                    </select>
                </div>
            </div>

            <div class="constructor-grid">
                <div class="input-group">
                    <label>Владелец</label>
                    <input type="text" id="p_owner" class="c-input" value="Никнейм">
                </div>
                <div class="input-group">
                    <label>Кол-во колец (0-3)</label>
                    <input type="number" id="p_rings" class="c-input" value="1" min="0" max="3">
                </div>
            </div>
        </div>

        <div class="preview-sticky">
            <div class="card-visual" id="v_card">
                <div class="hole" id="v_hole"></div>
                <div class="access-dots" id="v_dots"></div>
                <div class="card-text-main" id="v_text">KEYCARD</div>
                <div class="card-owner" id="v_owner">OWNER NAME</div>
            </div>

            <div class="result-box">
                <div class="card-title" style="font-size: 1rem; margin-bottom: 10px;">// ВЫХОДНАЯ КОМАНДА</div>
                <div class="result-command" id="final_cmd">Загрузка...</div>
                <button class="copy-btn btn-primary" id="copy_btn" style="width: 100%;" data-payload="">КОПИРОВАТЬ</button>
            </div>
        </div>
    </div>
</div>

<script>
    function update() {
        // Данные
        const val = (id) => document.getElementById(id).value;
        
        const data = {
            id: val('p_id'),
            model: val('p_model'),
            inv: val('p_inv'),
            scp: val('p_scp'),
            weap: val('p_weap'),
            adm: val('p_adm'),
            cCol: val('p_cColor'),
            bgCol: val('p_bgColor'),
            text: val('p_text'),
            tCol: val('p_tColor'),
            owner: val('p_owner'),
            rings: val('p_rings')
        };

        // Генерация команды
        const cmd = `ckeycard ${data.id} ${data.model} ${data.inv} ${data.scp} ${data.weap} ${data.adm} ${data.cCol} ${data.bgCol} ${data.text} ${data.tCol} ${data.owner} ${data.rings}`;
        document.getElementById('final_cmd').innerText = cmd;
        document.getElementById('copy_btn').setAttribute('data-payload', cmd);

        // Визуальное обновление
        const vCard = document.getElementById('v_card');
        vCard.style.backgroundColor = data.bgCol;
        
        const vText = document.getElementById('v_text');
        vText.innerText = data.text;
        vText.style.color = data.tCol;

        const vOwner = document.getElementById('v_owner');
        vOwner.innerText = data.owner;
        vOwner.style.color = data.tCol;

        // Точки доступа
        const vDots = document.getElementById('v_dots');
        vDots.innerHTML = '';
        for(let i=0; i<3; i++) {
            let dot = document.createElement('div');
            dot.className = 'dot';
            dot.style.backgroundColor = data.cCol;
            dot.style.opacity = (i < data.scp) ? '1' : '0.2';
            vDots.appendChild(dot);
        }

        // Кольца у отверстия
        const vHole = document.getElementById('v_hole');
        vHole.style.boxShadow = `0 0 0 ${data.rings * 4}px rgba(255,255,255,0.1)`;
    }

    // Слушатели
    document.querySelectorAll('.c-input, .c-select').forEach(el => {
        el.addEventListener('input', update);
    });

    // Логика копирования (используем твой основной скрипт или этот быстрый фикс)
    document.getElementById('copy_btn').addEventListener('click', function() {
        const payload = this.getAttribute('data-payload');
        navigator.clipboard.writeText(payload);
        const original = this.innerText;
        this.innerText = 'ГОТОВО!';
        this.classList.add('success');
        setTimeout(() => {
            this.innerText = original;
            this.classList.remove('success');
        }, 1000);
    });

    update(); // Инициализация
</script>

</body>
</html>
