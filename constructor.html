<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор Карт | Desolation</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="AStyle.css">
    <style>
        /* Специфичные стили для конструктора */
        .constructor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: start;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-family: var(--font-heading);
            font-size: 0.9rem;
            color: var(--accent);
            text-transform: uppercase;
        }

        select, input {
            width: 100%;
            padding: 12px;
            background: #0d1117;
            border: 1px solid #2d3545;
            border-radius: 6px;
            color: #fff;
            font-family: var(--font-body);
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input:focus {
            border-color: var(--accent);
        }

        .result-box {
            background: #000;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--accent);
            position: sticky;
            top: 20px;
        }

        #command-output {
            font-family: 'Courier New', monospace;
            word-break: break-all;
            color: var(--success);
            font-size: 1rem;
            margin-bottom: 20px;
            min-height: 60px;
        }

        @media (max-width: 768px) {
            .constructor-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Desolation <strong>Project</strong></div>
    <nav>
        <a href="index.html">Главная</a>
        <a href="guides.html">Guides</a>
        <a href="constructor.html" class="active">Constructor</a>
    </nav>
</header>

<div class="container">
    <h1>Конструктор Карт</h1>
    <div class="instruction">Генератор команд для кастомных ключ-карт</div>

    <div class="constructor-container">
        <div class="main-card">
            <div class="card-title">// НАСТРОЙКИ КАРТЫ</div>
            
            <div class="input-group">
                <label>Ваш Player ID</label>
                <input type="number" id="playerID" value="1" placeholder="ID игрока">
            </div>

            <div class="input-group">
                <label>Тип корпуса (Модель)</label>
                <select id="cardModel">
                    <option value="KeycardCustomTaskForce">TaskForce (Черно-золотая)</option>
                    <option value="KeycardCustomMetalcase">Metal Case</option>
                    <option value="keycardcustommanagement">Management</option>
                    <option value="keycardcustomsite02">Site-02 Edition</option>
                </select>
            </div>

            <div class="input-group">
                <label>Название на карте</label>
                <input type="text" id="cardName" value="NAME" placeholder="Введите имя...">
            </div>

            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                <div class="input-group">
                    <label>Cont. Lvl</label>
                    <input type="number" id="lvl1" value="3" min="0" max="3">
                </div>
                <div class="input-group">
                    <label>Arm. Lvl</label>
                    <input type="number" id="lvl2" value="3" min="0" max="3">
                </div>
                <div class="input-group">
                    <label>Adm. Lvl</label>
                    <input type="number" id="lvl3" value="3" min="0" max="3">
                </div>
            </div>

            <div class="input-group">
                <label>Цвет (HEX)</label>
                <input type="text" id="cardColor" value="#EFC01A" placeholder="#FFFFFF">
            </div>
        </div>

        <div class="result-box">
            <div class="card-title" style="font-size: 1.2rem; margin-bottom: 15px;">// ГОТОВАЯ КОМАНДА</div>
            <div id="command-output">ckeycard 1 KeycardCustomTaskForce Deluxe_Private_Card 3 3 3 #EFC01A 000000 NAME 420 69 1</div>
            <button class="copy-btn btn-primary" id="copyBtn" style="width: 100%;">КОПИРОВАТЬ КОМАНДУ</button>
        </div>
    </div>
</div>

<script>
    const inputs = ['playerID', 'cardModel', 'cardName', 'lvl1', 'lvl2', 'lvl3', 'cardColor'];
    const output = document.getElementById('command-output');

    function updateCommand() {
        const id = document.getElementById('playerID').value || "1";
        const model = document.getElementById('cardModel').value;
        const name = document.getElementById('cardName').value || "NAME";
        const l1 = document.getElementById('lvl1').value || "0";
        const l2 = document.getElementById('lvl2').value || "0";
        const l3 = document.getElementById('lvl3').value || "0";
        const color = document.getElementById('cardColor').value || "#FFFFFF";

        // Собираем строку (шаблон из твоего гайда)
        const cmd = `ckeycard ${id} ${model} Deluxe_Private_Card ${l1} ${l2} ${l3} ${color} 000000 ${name} 420 69 1`;
        
        output.innerText = cmd;
    }

    // Вешаем обновление на все поля
    inputs.forEach(id => {
        document.getElementById(id).addEventListener('input', updateCommand);
    });

    // Логика копирования
    document.getElementById('copyBtn').addEventListener('click', function() {
        navigator.clipboard.writeText(output.innerText).then(() => {
            const originalText = this.innerText;
            this.innerText = 'СКОПИРОВАНО!';
            this.style.backgroundColor = 'var(--success)';
            setTimeout(() => {
                this.innerText = originalText;
                this.style.backgroundColor = 'var(--accent)';
            }, 1000);
        });
    });
</script>

</body>
</html>
