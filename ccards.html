<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCards | Dark Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* ===================
           БАЗОВЫЕ СТИЛИ
           =================== */
        body { 
            font-family: 'Roboto', sans-serif; 
            margin: 0; 
            background: #0d0d0d; 
            color: #eeeeee; 
            line-height: 1.5;
        }

        /* ===================
           ШАПКА И НАВИГАЦИЯ
           =================== */
        header {
            padding: 20px 5%;
            background: #161616;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { 
            font-family: 'Oswald', sans-serif; 
            font-size: 1.5rem; 
            text-transform: uppercase; 
            color: #fff;
        }

        .logo strong { color: #ff9500; } /* Оранжевый акцент в логотипе */

        nav {
            display: flex;
            gap: 20px;
        }

        nav a { 
            text-decoration: none; 
            color: #aaa; 
            font-weight: 500; 
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: color 0.2s; 
        }

        nav a:hover, nav a.active { color: #ff9500; }

        /* ===================
           ОСНОВНОЙ КОНТЕНТ
           =================== */
        .container {
            max-width: 1000px;
            margin: 50px auto;
            padding: 0 20px;
        }

        h1 { 
            font-family: 'Oswald', sans-serif; 
            font-size: 3.5rem; 
            letter-spacing: 4px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .instruction {
            color: #888;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            margin-bottom: 40px;
            border-left: 2px solid #ff9500; 
            padding-left: 15px;
        }

        /* ===================
           КАРТОЧКА-КОНТЕЙНЕР
           =================== */
        .main-card {
            background: #161616; 
            border: 1px solid #222;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 30px; /* Отступ на случай нескольких таких блоков */
        }

        .card-title {
            font-family: 'Oswald', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
        }

        /* ===================
           АККОРДЕОНЫ (СПИСКИ)
           =================== */
        .accordion-item {
            background: #1f1f1f; 
            margin-bottom: 12px;
            border-radius: 6px;
            overflow: hidden;
            transition: background 0.2s;
        }

        .accordion-item:hover { background: #252525; }

        summary {
            padding: 18px 25px;
            font-weight: 700;
            cursor: pointer;
            list-style: none; /* Убираем стандартный маркер */
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #ff9500; 
            text-transform: uppercase;
            letter-spacing: 1px;
            outline: none; /* Убираем стандартную синюю рамку */
        }

        /* Безопасный фокус для навигации с клавиатуры */
        summary:focus-visible {
            box-shadow: inset 0 0 0 2px #ff9500;
        }

        /* Кастомная стрелочка */
        summary::after {
            content: '▼';
            font-size: 0.7rem;
            color: #666;
            transition: transform 0.3s ease;
        }

        details[open] summary::after { transform: rotate(180deg); color: #ff9500; }
        summary::-webkit-details-marker { display: none; } /* Для старых Safari */

        /* ===================
           КНОПКИ
           =================== */
        .button-group {
            display: flex;
            gap: 15px;
            padding: 0 25px 25px 25px;
        }

        .copy-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .btn-primary { background: #ff9500; color: #000; }
        .btn-primary:hover { background: #e08300; transform: translateY(-1px); }

        .btn-secondary { background: #333; color: #fff; border: 1px solid #444; }
        .btn-secondary:hover { background: #444; transform: translateY(-1px); }

        .copy-btn.success { background: #2ecc71 !important; color: #fff !important; border-color: #2ecc71; }

        /* ===================
           ПОДВАЛ
           =================== */
        footer {
            margin-top: 80px;
            padding: 40px 20px;
            background: #111;
            color: #555;
            text-align: center;
            border-top: 1px solid #222;
            font-size: 0.9rem;
        }

        /* ===================
           МОБИЛЬНАЯ АДАПТАЦИЯ
           =================== */
        @media (max-width: 768px) {
            header { flex-direction: column; gap: 15px; text-align: center; padding: 20px; }
            nav { flex-wrap: wrap; justify-content: center; }
            .main-card { padding: 25px 15px; }
            .button-group { flex-direction: column; }
            h1 { font-size: 2.2rem; }
            summary { padding: 15px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Desolation <strong>Project</strong></div>
    <nav>
        <a href="./">Главная</a>
        <a href="cassie.html">C.A.S.S.I.E.</a>
        <a href="cinfo.html">Cinfo</a>
        <a href="ccards.html" class="active">CCards</a> </nav>
</header>

<div class="container">
    <h1>CCARDS</h1>
    <div class="instruction">Используйте кнопки внутри списков для копирования конфигураций</div>

    <div class="main-card">
        <div class="card-title">Кастомные ключ карты</div>

        <details class="accordion-item">
            <summary>Служба безопасности</summary>
            <div class="button-group">
                <button class="copy-btn btn-primary" data-payload="Йоу йоу йоу">Копировать Конфиг</button>
                <button class="copy-btn btn-secondary" data-payload="CODE_SEC_1">Копировать Конфиг</button>

                <button class="copy-btn btn-primary" data-payload="Йоу йоу йоу">Копировать Конфиг</button>
                <button class="copy-btn btn-secondary" data-payload="CODE_SEC_1">Копировать Конфиг</button>
        </details>

        <details class="accordion-item">
            <summary>Научная служба и руководство</summary>
            <div class="button-group">
                <button class="copy-btn btn-primary" data-payload="CODE_SCI_1">Конфиг Научников</button>
                <button class="copy-btn btn-secondary" data-payload="CODE_SCI_2">Конфиг Руководства</button>
            </div>
        </details>

        <details class="accordion-item">
            <summary>Персонал фонда и класс D</summary>
            <div class="button-group">
                <button class="copy-btn btn-primary" data-payload="CODE_D_1">Карта D-Класса</button>
                <button class="copy-btn btn-secondary" data-payload="CODE_D_2">Карта Персонала</button>
            </div>
        </details>

    </div>
    
    </div>

<footer>
    <p>Desolation Project &copy; 2026<br>Все права не защищены</p>
</footer>

<script>
    // Оптимизированный JS
    document.addEventListener('click', function(e) {
        if (e.target.classList.contains('copy-btn')) {
            const btn = e.target;
            // Проверка, не нажата ли уже кнопка (чтобы избежать спама кликами)
            if (btn.classList.contains('success')) return;

            const textToCopy = btn.getAttribute('data-payload');
            const originalText = btn.innerText;

            navigator.clipboard.writeText(textToCopy).then(() => {
                btn.innerText = 'СКОПИРОВАНО!';
                btn.classList.add('success');
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.remove('success');
                }, 1500);
            }).catch(err => {
                console.error('Ошибка копирования: ', err);
                btn.innerText = 'ОШИБКА!';
                setTimeout(() => btn.innerText = originalText, 1500);
            });
        }
    });
</script>

</body>
</html>
